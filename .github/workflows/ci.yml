name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Validate skill structure
        run: python3 validate_skills.py

      - name: Validator regression tests
        run: |
          test -f tests/test_validators.py
          python3 -m unittest discover -s tests -p 'test_*.py'

      - name: API drift check
        run: |
          for i in 1 2 3; do
            if python3 verify_api_drift.py; then
              exit 0
            fi
            echo "Retry $i/3..."
            sleep 5
          done
          exit 1

      - name: Source URL check
        run: |
          for i in 1 2 3; do
            if python3 verify_source_urls.py; then
              exit 0
            fi
            echo "Retry $i/3..."
            sleep 5
          done
          exit 1

      - name: Version pin check
        run: python3 verify_version_pins.py || true

  install-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install skills from checked-out repo
        run: npx -y skills add . --yes

      - name: Verify skills installed
        shell: bash
        run: |
          # skills CLI installs to .agents/skills/
          SKILLS_DIR=".agents/skills"

          if [ ! -d "$SKILLS_DIR" ]; then
            echo "ERROR: $SKILLS_DIR not found"
            echo "Listing current directory:"
            find . -maxdepth 3 -type f 2>/dev/null | head -30
            exit 1
          fi

          count=$(find "$SKILLS_DIR" -name "SKILL.md" | wc -l)
          expected_count=$(find skills -mindepth 2 -maxdepth 2 -name "SKILL.md" | wc -l)
          echo "Found $count skills in $SKILLS_DIR (expected $expected_count)"

          if [ "$count" -ne "$expected_count" ]; then
            echo "ERROR: Expected $expected_count skills, got $count"
            exit 1
          fi

          # Verify every published full reference is installed.
          ref_count=$(find "$SKILLS_DIR" -path "*/references/full.md" -type f | wc -l)
          expected_ref_count=$(find skills -path "*/references/full.md" -type f | wc -l)
          echo "Found $ref_count reference files (expected $expected_ref_count)"

          if [ "$ref_count" -ne "$expected_ref_count" ]; then
            echo "ERROR: Expected $expected_ref_count reference files, got $ref_count"
            exit 1
          fi

          resource_count=$(find "$SKILLS_DIR" -path "*/references/*" -type f ! -name "full.md" | wc -l)
          expected_resource_count=$(find skills -path "*/references/*" -type f ! -name "full.md" | wc -l)
          echo "Found $resource_count supporting resources (expected $expected_resource_count)"

          if [ "$resource_count" -ne "$expected_resource_count" ]; then
            echo "ERROR: Expected $expected_resource_count supporting resources, got $resource_count"
            exit 1
          fi

          echo "Install test passed ($count skills, $ref_count references, $resource_count resources)"
